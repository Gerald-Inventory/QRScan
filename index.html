<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapid QR Scanner Archive</title>
    
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        :root {
            --bg-primary: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --success: #16a34a;
            --error: #dc2626;
            --border-radius: 12px;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        .app-container {
            background: var(--surface);
            width: 100%;
            max-width: 600px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            padding: 24px;
        }

        .app-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .app-header h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .app-header p {
            font-size: 14px;
            color: var(--text-muted);
        }

        .scanner-window {
            width: 100%;
            border-radius: var(--border-radius);
            overflow: hidden;
            background: #000000;
            margin-bottom: 12px;
            position: relative;
        }

        #qr-reader-viewport {
            border: none !important;
        }

        /* Framework Standard Override Control States */
        #qr-reader-viewport button {
            background-color: var(--accent);
            color: #ffffff;
            border: none;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            margin: 15px auto;
            display: block;
        }

        .control-panel {
            margin-bottom: 20px;
            text-align: center;
        }

        .resume-btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        .resume-btn:hover {
            background-color: var(--accent-hover);
        }

        /* Structured Logging Tables layout grid options */
        .table-section {
            margin-bottom: 24px;
        }

        .table-section h3 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .table-wrapper {
            max-height: 220px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: #fafafa;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: #f1f5f9;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 1;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .empty-row {
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
        }

        /* Action Footer Panel Form Fields */
        .dispatch-form {
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        .main-btn {
            background-color: var(--success);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .main-btn:hover {
            opacity: 0.9;
        }

        .main-btn:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
        }

        .status-alert {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            margin-top: 12px;
            background: #f1f5f9;
        }

        .status-alert.sending { color: #d97706; }
        .status-alert.success { color: var(--success); background: #f0fdf4; }
        .status-alert.error { color: var(--error); background: #fef2f2; }
        .hidden { display: none !important; }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <h1>Dynamic QR Collector</h1>
            <p>Scanning stops instantly on each match. Add multiple codes, then finalize delivery.</p>
        </header>

        <main class="scanner-window">
            <div id="qr-reader-viewport"></div>
        </main>

        <div class="control-panel">
            <button id="resume-scan-btn" class="resume-btn hidden" onclick="startScannerEngine()">
                🔄 Scan Next Code
            </button>
        </div>

        <section class="table-section">
            <h3>Collected Payloads Log</h3>
            <div class="table-wrapper">
                <table id="scan-history-table">
                    <thead>
                        <tr>
                            <th style="width: 20%;">Sl.No</th>
                            <th style="width: 80%;">QR Data Content String</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr id="empty-placeholder" class="empty-row">
                            <td colspan="2">No data captured. Use camera preview matrix above...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <footer class="dispatch-form">
            <button id="send-data-btn" class="main-btn" onclick="compileAndEmailData()">
                Send Mail
            </button>

            <div id="processing-loader" class="status-alert hidden">
                <span class="spinner"></span> <span id="status-text">Processing workflow context execution...</span>
            </div>
        </footer>
    </div>

    <script>
        /**
         * 1. GATEWAY CONSTANT KEY CONFIGURATIONS
         * Inject your active verified dashboard generated hashes here.
         */
        const EMAILJS_PUBLIC_KEY  = "YOUR_EMAILJS_PUBLIC_KEY"; 
        const EMAILJS_SERVICE_ID  = "YOUR_SERVICE_ID";   
        const EMAILJS_TEMPLATE_ID = "YOUR_TEMPLATE_ID"; 
        
        // Hardcoded Recipient Target Parameter Matrix Definition
        const TARGET_EMAIL_INBOX  = "ggodfrey25@gmail.com";

        // Connect Local SDK API Layer Engine instances
        emailjs.init(EMAILJS_PUBLIC_KEY);

        // Core memory variables structure stack
        let scannedItemsCollection = [];
        let qrScannerInstance = null;

        // DOM Framework Matrix Node Pointers
        const tableBody        = document.getElementById('table-body');
        const emptyPlaceholder = document.getElementById('empty-placeholder');
        const resumeScanButton = document.getElementById('resume-scan-btn');
        const processingLoader = document.getElementById('processing-loader');
        const statusText       = document.getElementById('status-text');
        const sendButton       = document.getElementById('send-data-btn');

        /**
         * 2. INITIALIZE AND START SCANNER RUNTIME CORE ENGINE
         */
        function startScannerEngine() {
            // Hide the resume toggle option while camera viewport session track is active
            resumeScanButton.classList.add('hidden');

            if (!qrScannerInstance) {
                qrScannerInstance = new Html5Qrcode("qr-reader-viewport");
            }

            const scanConfigurationParameters = { 
                fps: 15, 
                qrbox: { width: 250, height: 250 }
            };

            // Request explicitly the rear camera module matrix constraints pipelines 
            qrScannerInstance.start(
                { facingMode: "environment" }, 
                scanConfigurationParameters,
                onScanSuccess,
                onScanFailure
            ).catch(err => {
                console.warn("Camera streaming connection thread failed context init setup:", err);
                // Fallback attempt to pick whatever system camera index engine path is open locally
                qrScannerInstance.start({ facingMode: "user" }, scanConfigurationParameters, onScanSuccess, onScanFailure);
            });
        }

        /**
         * Success match capture interface handler logic execution steps
         */
        function onScanSuccess(decodedText, decodedResult) {
            // AUTOMATIC STOP IMMEDIATELY: Kill active video tracks on match capture instance framework
            if (qrScannerInstance) {
                qrScannerInstance.stop().then(() => {
                    console.log("Camera interface track stopped safely to lock user entry workflow frame.");
                    resumeScanButton.classList.remove('hidden'); // Show choice control option step track button
                }).catch(err => {
                    console.error("Failed to cycle pause loop control status properties:", err);
                });
            }

            // Wipe base row string placeholders if tracking array stack matches zero items parameters
            if (scannedItemsCollection.length === 0) {
                tableBody.innerHTML = "";
            }

            // Push into session runtime memory matrix block arrays tracker list data schema
            scannedItemsCollection.push(decodedText);
            const entryIndexCounterNumber = scannedItemsCollection.length;

            // Generate structural raw clean output node item layout
            const rowViewElementNode = document.createElement('tr');
            rowViewElementNode.innerHTML = `<td>#${entryIndexCounterNumber}</td><td><strong>${decodedText}</strong></td>`;
            tableBody.appendChild(rowViewElementNode);

            // Force visual containers view frame focus down towards the latest data trace additions
            const scrollContainerWrapper = document.querySelector('.table-wrapper');
            scrollContainerWrapper.scrollTop = scrollContainerWrapper.scrollHeight;
        }

        function onScanFailure(error) {
            // Drops noise track framework sweep cycles logs dropping
        }

        // Execute automatically on immediate clean boot step context window run initialization paths
        startScannerEngine();

        /**
         * 3. DISPATCH SECURE COMPILATION EXPORTS VIA EMAILJS ENDPOINTS
         */
        function compileAndEmailData() {
            if (scannedItemsCollection.length === 0) {
                alert("The logs record summary data set matrix matches nothing. Capture entries via code reader first.");
                return;
            }

            // Parse full tracking data array variables stacks cleanly down to individual text strings rows
            let plainTextExportMessageContent = `Session Scanned Activity Log Target List Details Summary:\n`;
            plainTextExportMessageContent += `Target Mailbox: ${TARGET_EMAIL_INBOX}\n`;
            plainTextExportMessageContent += `--------------------------------------------------------\n\n`;
            
            scannedItemsCollection.forEach((payloadValue, numericalId) => {
                plainTextExportMessageContent += `[Index Entry #${numericalId + 1}] | Code Payload: ${payloadValue}\n`;
            });

            // Adjust interface loader tracking attributes elements state updates changes
            processingLoader.classList.remove('hidden');
            processingLoader.className = "status-alert sending";
            statusText.innerText = "Transmitting records directly to locked inbox...";
            sendButton.disabled = true;

            // Maps parameters names fields explicitly inside your cloud dashboard layout builder template variables setups
            const transactionalTemplateParamsOptions = {
                scan_timestamp: new Date().toLocaleString(),
                qr_content: plainTextExportMessageContent, 
                recipient_email: TARGET_EMAIL_INBOX 
            };

            emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, transactionalTemplateParamsOptions)
                .then(function(response) {
                    processingLoader.className = "status-alert success";
                    statusText.innerText = "✔ Log compilation successfully sent to ggodfrey25@gmail.com!";
                    sendButton.disabled = false;
                    
                    // Wipe local arrays memory lists context states automatically down clean elements state configurations
                    scannedItemsCollection = [];
                    tableBody.innerHTML = `<tr id="empty-placeholder" class="empty-row"><td colspan="2">No data captured. Use camera preview matrix above...</td></tr>`;
                }, function(error) {
                    processingLoader.className = "status-alert error";
                    statusText.innerText = "❌ Transmission fail error. Check credential keys values matches context inputs.";
                    sendButton.disabled = false;
                    console.error('CRITICAL TRANSIT API SYSTEM EXCEPTION RESPONSE LOG:', error);
                });
        }
    </script>
</body>
</html>
