<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise QR Scanner Log</title>
    
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        :root {
            --bg-primary: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --success: #16a34a;
            --error: #dc2626;
            --border-radius: 12px;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        .app-container {
            background: var(--surface);
            width: 100%;
            max-width: 600px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            padding: 24px;
        }

        .app-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .app-header h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .app-header p {
            font-size: 14px;
            color: var(--text-muted);
        }

        .scanner-window {
            width: 100%;
            border-radius: var(--border-radius);
            overflow: hidden;
            background: #000000;
            margin-bottom: 20px;
        }

        #qr-reader-viewport {
            border: none !important;
        }

        /* Framework Button Overrides */
        #qr-reader-viewport button {
            background-color: var(--accent);
            color: #ffffff;
            border: none;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            margin: 15px auto;
            display: block;
        }

        /* History Table Container Styling */
        .table-section {
            margin-bottom: 24px;
        }

        .table-section h3 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .table-wrapper {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: #fafafa;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }

        th, td {
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: #f1f5f9;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 1;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .empty-row {
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
        }

        /* Form & Control Elements */
        .dispatch-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
        }

        .input-field {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-field:focus {
            border-color: var(--accent);
        }

        .main-btn {
            background-color: var(--success);
            color: white;
            border: none;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        .main-btn:hover {
            opacity: 0.9;
        }

        .main-btn:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
        }

        .status-alert {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            margin-top: 12px;
            background: #f1f5f9;
        }

        .status-alert.sending { color: #d97706; }
        .status-alert.success { color: var(--success); background: #f0fdf4; }
        .status-alert.error { color: var(--error); background: #fef2f2; }
        .hidden { display: none !important; }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <h1>QR Data Logger</h1>
            <p>Scan multiple codes to compile a list, then email the records.</p>
        </header>

        <main class="scanner-window">
            <div id="qr-reader-viewport"></div>
        </main>

        <section class="table-section">
            <h3>Scanned Session Records</h3>
            <div class="table-wrapper">
                <table id="scan-history-table">
                    <thead>
                        <tr>
                            <th style="width: 35%;">Timestamp</th>
                            <th style="width: 65%;">Data Payload</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr id="empty-placeholder" class="empty-row">
                            <td colspan="2">No codes captured yet. Ready to scan...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <footer class="dispatch-form">
            <div class="input-group">
                <label for="target-email">Recipient Email Address</label>
                <input type="email" id="target-email" class="input-field" placeholder="name@example.com" required>
            </div>
            
            <button id="send-data-btn" class="main-btn" onclick="compileAndEmailData()">
                Transmit Scanned List
            </button>

            <div id="processing-loader" class="status-alert hidden">
                <span class="spinner"></span> <span id="status-text">Processing action...</span>
            </div>
        </footer>
    </div>

    <script>
        /**
         * 1. GATEWAY API CREDENTIAL CONFIGURATION
         * Swap these placeholders with your unique EmailJS tracking hashes.
         */
        const EMAILJS_PUBLIC_KEY  = "YOUR_EMAILJS_PUBLIC_KEY"; 
        const EMAILJS_SERVICE_ID  = "YOUR_SERVICE_ID";   
        const EMAILJS_TEMPLATE_ID = "YOUR_TEMPLATE_ID"; 

        emailjs.init(EMAILJS_PUBLIC_KEY);

        // Memory array to stack continuous scans before email transmission
        let scannedItemsCollection = [];

        // DOM Matrix Element Pointers
        const tableBody        = document.getElementById('table-body');
        const emptyPlaceholder = document.getElementById('empty-placeholder');
        const emailInputField  = document.getElementById('target-email');
        const processingLoader = document.getElementById('processing-loader');
        const statusText       = document.getElementById('status-text');
        const sendButton       = document.getElementById('send-data-btn');

        /**
         * 2. INITIALIZE QR SCANNER WITH ENVIRONMENT (BACK) CAMERA PREFERENCE
         */
        const qrScannerEngine = new Html5QrcodeScanner(
            "qr-reader-viewport", 
            { 
                fps: 12, 
                qrbox: { width: 250, height: 250 },
                rememberLastUsedCamera: true,
                // Explicitly requesting rear camera module
                supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA],
                videoConstraints: {
                    facingMode: { exact: "environment" } 
                }
            },
            /* verbose= */ false
        );

        /**
         * Success trigger callback executed on every verified pattern capture match
         */
        function onScanSuccess(decodedText, decodedResult) {
            // Remove the empty row indicator on first valid scan match
            if (scannedItemsCollection.length === 0) {
                tableBody.innerHTML = "";
            }

            const timestampStr = new Date().toLocaleTimeString();
            
            // Save data locally inside runtime memory schema
            scannedItemsCollection.push({
                time: timestampStr,
                payload: decodedText
            });

            // Append new row structure cleanly directly into active UI table matrix
            const newRow = document.createElement('tr');
            newRow.innerHTML = `<td>${timestampStr}</td><td><strong>${decodedText}</strong></td>`;
            tableBody.prepend(newRow); // Shows newest entries at the top of your list
            
            // Brief visual audio alert feedback equivalent check log tracking
            console.log("Captured scan item instance safely:", decodedText);
        }

        function onScanFailure(error) {
            // Silent drop for frame tracking seeking sweeps
        }

        // Render camera module interface components directly to UI view frame container
        qrScannerEngine.render(onScanSuccess, onScanFailure);

        /**
         * 3. COMPILATION AND EMAIL DISPATCH ENGINE VIA EMAILJS
         */
        function compileAndEmailData() {
            const dynamicEmailDestination = emailInputField.value.trim();

            // Form validation checks
            if (!dynamicEmailDestination) {
                alert("Please input a recipient email address before transmitting records.");
                return;
            }
            if (scannedItemsCollection.length === 0) {
                alert("Your scan records log table is currently empty. Please scan a QR code first.");
                return;
            }

            // Convert array structures into a formatted text layout string blocks for email template readouts
            let dynamicEmailContentBody = "Below is the log compilation summary of your scanned session:\n\n";
            scannedItemsCollection.forEach((item, index) => {
                dynamicEmailContentBody += `[Item ${index + 1}] | Time: ${item.time} | Data: ${item.payload}\n`;
            });

            // Engage loader controls UI
            processingLoader.classList.remove('hidden');
            processingLoader.className = "status-alert sending";
            statusText.innerText = "Transmitting records packet...";
            sendButton.disabled = true;

            // Target mapping values inside your EmailJS dashboard template window variables
            const templateParams = {
                scan_timestamp: new Date().toLocaleString(),
                qr_content: dynamicEmailContentBody, // Sends the fully formatted compiled text list
                recipient_email: dynamicEmailDestination // Sends directly to the typed email address
            };

            emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, templateParams)
                .then(function(response) {
                    processingLoader.className = "status-alert success";
                    statusText.innerText = "✔ Log successfully emailed to recipient!";
                    sendButton.disabled = false;
                    
                    // Optional clear logic toggle: if you want to wipe table clean after sending, uncomment below:
                    // clearSessionRecords();
                    
                }, function(error) {
                    processingLoader.className = "status-alert error";
                    statusText.innerText = "❌ Transmission fail error. Check developer log.";
                    sendButton.disabled = false;
                    console.error('API GATEWAY FAULT LOG:', error);
                });
        }

        // Utility clear helper resets active arrays if required
        function clearSessionRecords() {
            scannedItemsCollection = [];
            tableBody.innerHTML = `<tr id="empty-placeholder" class="empty-row"><td colspan="2">No codes captured yet. Ready to scan...</td></tr>`;
        }
    </script>
</body>
</html>
