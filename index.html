<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dedicated Asset Barcode Collector</title>
    
    <!-- Core Stable Engines via CDN -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        :root {
            --bg-primary: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --success: #16a34a;
            --error: #dc2626;
            --csv-color: #0d9488;
            --border-radius: 12px;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        .app-container {
            background: var(--surface);
            width: 100%;
            max-width: 600px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            padding: 24px;
        }

        .app-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .app-header h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .app-header p {
            font-size: 14px;
            color: var(--text-muted);
        }

        .input-group {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-field {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
            background-color: #fafafa;
        }

        .input-field:focus {
            border-color: var(--accent);
            background-color: #fff;
        }

        .scanner-window {
            width: 100%;
            border-radius: var(--border-radius);
            overflow: hidden;
            background: #000000;
            margin-bottom: 12px;
            position: relative;
            min-height: 300px;
        }

        #qr-reader-viewport {
            border: none !important;
        }

        #qr-reader-viewport button {
            background-color: var(--accent);
            color: #ffffff;
            border: none;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            margin: 15px auto;
            display: block;
        }

        .control-panel {
            margin-bottom: 20px;
            text-align: center;
        }

        .resume-btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        .resume-btn:hover {
            background-color: var(--accent-hover);
        }

        .table-section {
            margin-bottom: 24px;
        }

        .table-section h3 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .table-wrapper {
            max-height: 220px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: #fafafa;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: #f1f5f9;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 1;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .empty-row {
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
        }

        .dispatch-form {
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .main-btn {
            background-color: var(--success);
            color: white;
            border: none;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .csv-btn {
            background-color: var(--csv-color);
            color: white;
            border: none;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .main-btn:hover, .csv-btn:hover {
            opacity: 0.9;
        }

        .main-btn:disabled, .csv-btn:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
            opacity: 0.6;
        }

        .status-alert {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            background: #f1f5f9;
        }

        .status-alert.sending { color: #d97706; }
        .status-alert.success { color: var(--success); background: #f0fdf4; }
        .status-alert.error { color: var(--error); background: #fef2f2; }
        .hidden { display: none !important; }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <h1>Asset Barcode Collector</h1>
            <p>Locked exclusively to industrial alphanumeric dash-style labels.</p>
        </header>

        <div class="input-group">
            <label for="department-name">Target Department</label>
            <input type="text" id="department-name" class="input-field" placeholder="Enter department name...">
        </div>

        <main class="scanner-window">
            <div id="qr-reader-viewport"></div>
        </main>

        <div class="control-panel">
            <button id="resume-scan-btn" class="resume-btn hidden" onclick="startScannerEngine()">
                🔄 Scan Next Asset
            </button>
        </div>

        <section class="table-section">
            <h3>Collected Payloads Log</h3>
            <div class="table-wrapper">
                <table id="scan-history-table">
                    <thead>
                        <tr>
                            <th style="width: 15%;">Sl.No</th>
                            <th style="width: 35%;">Department</th>
                            <th style="width: 50%;">Code Data Content String</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr id="empty-placeholder" class="empty-row">
                            <td colspan="3">No asset barcodes logged yet...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <footer class="dispatch-form">
            <div class="btn-group">
                <button id="send-data-btn" class="main-btn" onclick="compileAndEmailData()">
                    Send Mail
                </button>
                <button id="export-csv-btn" class="csv-btn" onclick="exportLogToCSV()">
                    Export CSV
                </button>
            </div>

            <div id="processing-loader" class="status-alert hidden">
                <span class="spinner"></span> <span id="status-text">Processing...</span>
            </div>
        </footer>
    </div>

    <script>
        // --- CONFIGURATION ---
        const EMAILJS_PUBLIC_KEY  = "YOUR_EMAILJS_PUBLIC_KEY"; 
        const EMAILJS_SERVICE_ID  = "YOUR_SERVICE_ID";   
        const EMAILJS_TEMPLATE_ID = "YOUR_TEMPLATE_ID"; 
        const TARGET_EMAIL_INBOX  = "ggodfrey25@gmail.com";

        emailjs.init(EMAILJS_PUBLIC_KEY);

        let scannedItemsCollection = [];
        let qrScannerInstance = null;

        const tableBody        = document.getElementById('table-body');
        const emptyPlaceholder = document.getElementById('empty-placeholder');
        const resumeScanButton = document.getElementById('resume-scan-btn');
        const processingLoader = document.getElementById('processing-loader');
        const statusText       = document.getElementById('status-text');
        const sendButton       = document.getElementById('send-data-btn');
        const csvButton        = document.getElementById('export-csv-btn');
        const departmentInput  = document.getElementById('department-name');

        /**
         * INITIALIZE SCANNER ENGINE - RUNS ONLY IN HTTPS/LOCALHOST ENVIRONMENTS
         */
        function startScannerEngine() {
            resumeScanButton.classList.add('hidden');

            if (window.location.protocol === 'file:') {
                alert("🚨 GitHub Deployment Note:\nThis will fail on local files. Commit this file as 'index.html' directly into your GitHub repository to generate an HTTPS deployment link.");
                return;
            }

            if (!qrScannerInstance) {
                qrScannerInstance = new Html5Qrcode("qr-reader-viewport", {
                    verbose: false,
                    experimentalFeatures: {
                        useBarCodeDetectorIfSupported: true // Native hardware acceleration
                    },
                    // ONLY looking for Code 128. Removes processing weight from QR/EAN codes entirely.
                    formatsToSupport: [
                        Html5QrcodeSupportedFormats.CODE_128
                    ]
                });
            }

            const engineConfigurationParameters = { 
                fps: 24, // High capture rate for moving/shaky hand tracking
                videoConstraints: {
                    facingMode: "environment",
                    width: { ideal: 1920 }, 
                    height: { ideal: 1080 }
                }
            };

            qrScannerInstance.start(
                { facingMode: "environment" }, 
                engineConfigurationParameters,
                onScanSuccess,
                onScanFailure
            ).catch(err => {
                console.warn("Primary lens constraints missed, lowering definition fallback profiles:", err);
                qrScannerInstance.start(
                    { facingMode: "environment" }, 
                    { fps: 20 }, 
                    onScanSuccess, 
                    onScanFailure
                ).catch(finalErr => {
                    alert("Camera blocked or unavailable. Please accept the browser's permission pop-up window prompt.\n\nError code: " + finalErr);
                });
            });
        }

        /**
         * FILTERS AND CAPTURES TARGET ALPHANUMERIC STRINGS
         */
        function onScanSuccess(decodedText, decodedResult) {
            // TARGET FILTRATION PATTERN: Matches groups separated by 3 dashes (e.g., "21045-HOME-A30001-S1")
            const accurateAssetPattern = /^[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+-[a-zA-Z0-9]+$/;
            
            if (!accurateAssetPattern.test(decodedText.trim())) {
                // If it is another type of text or barcode format entirely, drop it on the floor without pausing the stream
                console.log("Filtered out non-matching barcode pattern structure:", decodedText);
                return;
            }

            // If it passes the filter check, halt the lens loop context immediately
            if (qrScannerInstance) {
                qrScannerInstance.stop().then(() => {
                    resumeScanButton.classList.remove('hidden'); 
                }).catch(err => {
                    console.error("Stream stop processing failure exception:", err);
                });
            }

            if (scannedItemsCollection.length === 0) {
                tableBody.innerHTML = "";
            }

            const currentDepartment = departmentInput.value.trim() || "N/A";

            scannedItemsCollection.push({
                department: currentDepartment,
                payload: decodedText
            });

            const entryIndexCounterNumber = scannedItemsCollection.length;

            const rowViewElementNode = document.createElement('tr');
            rowViewElementNode.innerHTML = `
                <td>#${entryIndexCounterNumber}</td>
                <td>${escapeHtml(currentDepartment)}</td>
                <td><span style="color: var(--success); font-weight:700;">${escapeHtml(decodedText)}</span></td>
            `;
            tableBody.appendChild(rowViewElementNode);

            const scrollContainerWrapper = document.querySelector('.table-wrapper');
            scrollContainerWrapper.scrollTop = scrollContainerWrapper.scrollHeight;
        }

        function onScanFailure(error) {
            // Drop sequential check frame output loops to maximize battery life and UI response
        }

        function escapeHtml(string) {
            return String(string).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // Boot system scanner engine context on screen draw load
        startScannerEngine();

        function compileAndEmailData() {
            if (scannedItemsCollection.length === 0) {
                alert("The log is empty.");
                return;
            }

            let plainTextExportMessageContent = `Session Asset Management Sync Log Data:\n`;
            plainTextExportMessageContent += `Target Inbox Connection: ${TARGET_EMAIL_INBOX}\n`;
            plainTextExportMessageContent += `--------------------------------------------------------\n\n`;
            
            scannedItemsCollection.forEach((item, numericalId) => {
                plainTextExportMessageContent += `[Asset #${numericalId + 1}] Dept: ${item.department} | Tag ID: ${item.payload}\n`;
            });

            processingLoader.classList.remove('hidden');
            processingLoader.className = "status-alert sending";
            statusText.innerText = "Transmitting to inbox...";
            setButtonsDisabled(true);

            const transactionalTemplateParamsOptions = {
                scan_timestamp: new Date().toLocaleString(),
                qr_content: plainTextExportMessageContent, 
                recipient_email: TARGET_EMAIL_INBOX 
            };

            emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, transactionalTemplateParamsOptions)
                .then(function(response) {
                    processingLoader.className = "status-alert success";
                    statusText.innerText = `✔ Logs dispatched to ${TARGET_EMAIL_INBOX}!`;
                    setButtonsDisabled(false);
                    clearSessionLog();
                }, function(error) {
                    processingLoader.className = "status-alert error";
                    statusText.innerText = "❌ Email transmission error. Exporting via CSV instead.";
                    setButtonsDisabled(false);
                });
        }

        function exportLogToCSV() {
            if (scannedItemsCollection.length === 0) {
                alert("No logged items available.");
                return;
            }

            let csvContentBody = "Serial Number,Department,Asset Tag Value\n";
            scannedItemsCollection.forEach((item, numericalId) => {
                csvContentBody += `"${numericalId + 1}","${item.department.replace(/"/g, '""')}","${item.payload.replace(/"/g, '""')}"\n`;
            });

            const blobObj = new Blob([csvContentBody], { type: 'text/csv;charset=utf-8;' });
            const anchorLink = document.createElement("a");
            anchorLink.setAttribute("href", URL.createObjectURL(blobObj));
            anchorLink.setAttribute("download", `Asset_Report_${new Date().toISOString().slice(0,10)}.csv`);
            anchorLink.style.visibility = 'hidden';
            
            document.body.appendChild(anchorLink);
            anchorLink.click(); 
            document.body.removeChild(anchorLink);

            processingLoader.classList.remove('hidden');
            processingLoader.className = "status-alert success";
            statusText.innerText = "✔ CSV Downloaded.";
            clearSessionLog();
        }

        function setButtonsDisabled(stateValue) {
            sendButton.disabled = stateValue;
            csvButton.disabled = stateValue;
        }

        function clearSessionLog() {
            scannedItemsCollection = [];
            tableBody.innerHTML = `<tr id="empty-placeholder" class="empty-row"><td colspan="3">No asset barcodes logged yet...</td></tr>`;
        }
    </script>
</body>
</html>
