<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rapid QR Scanner & Exporter</title>
    
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        :root {
            --bg-primary: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --success: #16a34a;
            --error: #dc2626;
            --csv-color: #0d9488;
            --border-radius: 12px;
            --border-color: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        .app-container {
            background: var(--surface);
            width: 100%;
            max-width: 600px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            padding: 24px;
        }

        .app-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .app-header h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .app-header p {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* Form Controls Grouping */
        .input-group {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-field {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
            background-color: #fafafa;
        }

        .input-field:focus {
            border-color: var(--accent);
            background-color: #fff;
        }

        .scanner-window {
            width: 100%;
            border-radius: var(--border-radius);
            overflow: hidden;
            background: #000000;
            margin-bottom: 12px;
            position: relative;
        }

        #qr-reader-viewport {
            border: none !important;
        }

        #qr-reader-viewport button {
            background-color: var(--accent);
            color: #ffffff;
            border: none;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            margin: 15px auto;
            display: block;
        }

        .control-panel {
            margin-bottom: 20px;
            text-align: center;
        }

        .resume-btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        .resume-btn:hover {
            background-color: var(--accent-hover);
        }

        .table-section {
            margin-bottom: 24px;
        }

        .table-section h3 {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .table-wrapper {
            max-height: 220px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: #fafafa;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: #f1f5f9;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 1;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .empty-row {
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
        }

        /* Action Buttons Container Grid Layout */
        .dispatch-form {
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .main-btn {
            background-color: var(--success);
            color: white;
            border: none;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .csv-btn {
            background-color: var(--csv-color);
            color: white;
            border: none;
            padding: 14px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .main-btn:hover, .csv-btn:hover {
            opacity: 0.9;
        }

        .main-btn:disabled, .csv-btn:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
            opacity: 0.6;
        }

        .status-alert {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            background: #f1f5f9;
        }

        .status-alert.sending { color: #d97706; }
        .status-alert.success { color: var(--success); background: #f0fdf4; }
        .status-alert.error { color: var(--error); background: #fef2f2; }
        .hidden { display: none !important; }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <h1>Dynamic QR Collector</h1>
            <p>Scanning pauses instantly on match. Collect data, then mail or export directly.</p>
        </header>

        <div class="input-group">
            <label for="department-name">Target Department</label>
            <input type="text" id="department-name" class="input-field" placeholder="Enter department name (e.g., Logistics, HR)...">
        </div>

        <main class="scanner-window">
            <div id="qr-reader-viewport"></div>
        </main>

        <div class="control-panel">
            <button id="resume-scan-btn" class="resume-btn hidden" onclick="startScannerEngine()">
                🔄 Scan Next Code
            </button>
        </div>

        <section class="table-section">
            <h3>Collected Payloads Log</h3>
            <div class="table-wrapper">
                <table id="scan-history-table">
                    <thead>
                        <tr>
                            <th style="width: 15%;">Sl.No</th>
                            <th style="width: 35%;">Department</th>
                            <th style="width: 50%;">QR Data Content String</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr id="empty-placeholder" class="empty-row">
                            <td colspan="3">No data captured. Use camera preview matrix above...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <footer class="dispatch-form">
            <div class="btn-group">
                <button id="send-data-btn" class="main-btn" onclick="compileAndEmailData()">
                    Send Mail
                </button>
                <button id="export-csv-btn" class="csv-btn" onclick="exportLogToCSV()">
                    Export CSV
                </button>
            </div>

            <div id="processing-loader" class="status-alert hidden">
                <span class="spinner"></span> <span id="status-text">Processing workflow context execution...</span>
            </div>
        </footer>
    </div>

    <script>
        /**
         * 1. GATEWAY CONSTANT KEY CONFIGURATIONS
         * Inject your verified case-sensitive EmailJS dashboard credentials here.
         */
        const EMAILJS_PUBLIC_KEY  = "YOUR_EMAILJS_PUBLIC_KEY"; 
        const EMAILJS_SERVICE_ID  = "YOUR_SERVICE_ID";   
        const EMAILJS_TEMPLATE_ID = "YOUR_TEMPLATE_ID"; 
        
        // Hardcoded Recipient Target Parameter Matrix Definition
        const TARGET_EMAIL_INBOX  = "ggodfrey25@gmail.com";

        // Connect Local SDK API Layer Engine instances
        emailjs.init(EMAILJS_PUBLIC_KEY);

        // Core memory variables structure stack
        let scannedItemsCollection = [];
        let qrScannerInstance = null;

        // DOM Framework Matrix Node Pointers
        const tableBody        = document.getElementById('table-body');
        const emptyPlaceholder = document.getElementById('empty-placeholder');
        const resumeScanButton = document.getElementById('resume-scan-btn');
        const processingLoader = document.getElementById('processing-loader');
        const statusText       = document.getElementById('status-text');
        const sendButton       = document.getElementById('send-data-btn');
        const csvButton        = document.getElementById('export-csv-btn');
        const departmentInput  = document.getElementById('department-name');

        /**
         * 2. INITIALIZE AND START SCANNER RUNTIME CORE ENGINE
         */
        function startScannerEngine() {
            resumeScanButton.classList.add('hidden');

            if (!qrScannerInstance) {
                qrScannerInstance = new Html5Qrcode("qr-reader-viewport");
            }

            const scanConfigurationParameters = { 
                fps: 15, 
                qrbox: { width: 250, height: 250 }
            };

            qrScannerInstance.start(
                { facingMode: "environment" }, 
                scanConfigurationParameters,
                onScanSuccess,
                onScanFailure
            ).catch(err => {
                console.warn("Camera streaming fallback context init:", err);
                qrScannerInstance.start({ facingMode: "user" }, scanConfigurationParameters, onScanSuccess, onScanFailure);
            });
        }

        /**
         * Success match capture interface logic
         */
        function onScanSuccess(decodedText, decodedResult) {
            // AUTOMATIC STOP IMMEDIATELY: Pause camera view stream upon reading code
            if (qrScannerInstance) {
                qrScannerInstance.stop().then(() => {
                    console.log("Camera engine paused safely.");
                    resumeScanButton.classList.remove('hidden'); 
                }).catch(err => {
                    console.error("Failed to cycle pause loop control:", err);
                });
            }

            if (scannedItemsCollection.length === 0) {
                tableBody.innerHTML = "";
            }

            // Extract values and handle empty fallback labels securely
            const currentDepartment = departmentInput.value.trim() || "N/A";

            // Push an analytical entity object directly into runtime tracker stack
            scannedItemsCollection.push({
                department: currentDepartment,
                payload: decodedText
            });

            const entryIndexCounterNumber = scannedItemsCollection.length;

            // Generate clean structural log layout row targeting 3 distinct cells
            const rowViewElementNode = document.createElement('tr');
            rowViewElementNode.innerHTML = `
                <td>#${entryIndexCounterNumber}</td>
                <td>${escapeHtml(currentDepartment)}</td>
                <td><strong>${escapeHtml(decodedText)}</strong></td>
            `;
            tableBody.appendChild(rowViewElementNode);

            const scrollContainerWrapper = document.querySelector('.table-wrapper');
            scrollContainerWrapper.scrollTop = scrollContainerWrapper.scrollHeight;
        }

        function onScanFailure(error) {
            // Drop continuous scanner cycle updates quietly
        }

        // Mini escaping utility function to safely insert inputs to raw UI structures
        function escapeHtml(string) {
            return String(string).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // Execute automatically on immediate initial page load runtime
        startScannerEngine();

        /**
         * 3. DISPATCH SECURE COMPILATION EXPORTS VIA EMAILJS ENDPOINTS
         */
        function compileAndEmailData() {
            if (scannedItemsCollection.length === 0) {
                alert("The scanner log table is currently empty. Scan codes before transmitting.");
                return;
            }

            let plainTextExportMessageContent = `Session Scanned Activity Log Target List Details Summary:\n`;
            plainTextExportMessageContent += `Target Mailbox: ${TARGET_EMAIL_INBOX}\n`;
            plainTextExportMessageContent += `--------------------------------------------------------\n\n`;
            
            scannedItemsCollection.forEach((item, numericalId) => {
                plainTextExportMessageContent += `[Index Entry #${numericalId + 1}] | Dept: ${item.department} | Code Payload: ${item.payload}\n`;
            });

            processingLoader.classList.remove('hidden');
            processingLoader.className = "status-alert sending";
            statusText.innerText = "Transmitting records to locked inbox...";
            setButtonsDisabled(true);

            const transactionalTemplateParamsOptions = {
                scan_timestamp: new Date().toLocaleString(),
                qr_content: plainTextExportMessageContent, 
                recipient_email: TARGET_EMAIL_INBOX 
            };

            emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, transactionalTemplateParamsOptions)
                .then(function(response) {
                    processingLoader.className = "status-alert success";
                    statusText.innerText = `✔ Log compilation successfully sent to ${TARGET_EMAIL_INBOX}!`;
                    setButtonsDisabled(false);
                    clearSessionLog();
                }, function(error) {
                    processingLoader.className = "status-alert error";
                    statusText.innerText = "❌ Email transmission failed. Try exporting directly to CSV.";
                    setButtonsDisabled(false);
                    console.error('CRITICAL TRANSIT API SYSTEM EXCEPTION RESPONSE LOG:', error);
                });
        }

        /**
         * 4. DIRECT LOCAL CLIENT-SIDE CSV FILE EXPORTER
         */
        function exportLogToCSV() {
            if (scannedItemsCollection.length === 0) {
                alert("No data available in the table to export.");
                return;
            }

            // Build structural multi-column CSV text string block
            let csvContentBody = "Serial Number,Department,QR Code Data Content\n";
            scannedItemsCollection.forEach((item, numericalId) => {
                let cleanEscapedDept = item.department.replace(/"/g, '""');
                let cleanEscapedPayload = item.payload.replace(/"/g, '""');
                csvContentBody += `"${numericalId + 1}","${cleanEscapedDept}","${cleanEscapedPayload}"\n`;
            });

            // Convert string block text layout safely directly into a raw binary data object
            const blobObj = new Blob([csvContentBody], { type: 'text/csv;charset=utf-8;' });
            const anchorLink = document.createElement("a");
            
            // Generate temporary localized address context pointer link
            const urlAddressPointer = URL.createObjectURL(blobObj);
            const dateStamp = new Date().toISOString().slice(0,10);
            
            anchorLink.setAttribute("href", urlAddressPointer);
            anchorLink.setAttribute("download", `QR_Scan_Log_${dateStamp}.csv`);
            anchorLink.style.visibility = 'hidden';
            
            document.body.appendChild(anchorLink);
            anchorLink.click(); // Programmatically execute file generation pull download command hook
            document.body.removeChild(anchorLink);

            // Notify User of instant local download completion path success
            processingLoader.classList.remove('hidden');
            processingLoader.className = "status-alert success";
            statusText.innerText = "✔ CSV log file downloaded successfully!";
            
            // Optional auto reset: clear logs locally out upon export
            clearSessionLog();
        }

        // Helper interface utilities switches
        function setButtonsDisabled(stateValue) {
            sendButton.disabled = stateValue;
            csvButton.disabled = stateValue;
        }

        function clearSessionLog() {
            scannedItemsCollection = [];
            tableBody.innerHTML = `<tr id="empty-placeholder" class="empty-row"><td colspan="3">No data captured. Use camera preview matrix above...</td></tr>`;
        }
    </script>
</body>
</html>
