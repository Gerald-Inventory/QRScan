<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automated QR Code Scanner</title>
    
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        :root {
            --bg-primary: #f8fafc;
            --surface: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --success: #16a34a;
            --error: #dc2626;
            --border-radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        .app-container {
            background: var(--surface);
            width: 100%;
            max-width: 480px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            padding: 24px;
        }

        .app-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .app-header h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
        }

        .app-header p {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .scanner-window {
            width: 100%;
            border-radius: var(--border-radius);
            overflow: hidden;
            background: #000000;
        }

        #qr-reader-viewport {
            border: none !important;
        }

        /* Styling the internal library buttons */
        #qr-reader-viewport button {
            background-color: var(--accent);
            color: #ffffff;
            border: none;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            margin: 15px auto;
            display: block;
            transition: background-color 0.2s ease;
        }

        #qr-reader-viewport button:hover {
            background-color: var(--accent-hover);
        }

        #qr-reader-viewport select {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--text-muted);
            margin-bottom: 10px;
            font-size: 14px;
            width: 90%;
            max-width: 300px;
        }

        .results-panel {
            margin-top: 16px;
        }

        .status-alert {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            background: #f1f5f9;
        }

        .status-alert.sending { color: #d97706; }
        .status-alert.success { color: var(--success); background: #f0fdf4; }
        .status-alert.error { color: var(--error); background: #fef2f2; }

        .data-card {
            margin-top: 16px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            overflow: hidden;
        }

        .card-header {
            background: #edf2f7;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        .badge {
            color: var(--accent);
        }

        .card-body {
            padding: 12px;
            font-size: 15px;
            word-break: break-all;
            line-height: 1.5;
        }

        .hidden { display: none !important; }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid transparent;
            border-top-color: currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <h1>QR Data Archiver</h1>
            <p>Scan any QR code to instantly capture and email its contents.</p>
        </header>

        <main class="scanner-window">
            <div id="qr-reader-viewport"></div>
        </main>

        <footer class="results-panel">
            <div id="processing-loader" class="status-alert hidden">
                <span class="spinner"></span> <span id="status-text">Processing scan data...</span>
            </div>

            <div id="data-card" class="data-card hidden">
                <div class="card-header">
                    <span class="badge">Payload Captured</span>
                </div>
                <div class="card-body">
                    <p id="scanned-payload-string"></p>
                </div>
            </div>
        </footer>
    </div>

    <script>
        /**
         * 1. GATEWAY API CREDENTIAL CONFIGURATION
         * Sign up at https://www.emailjs.com to obtain these keys.
         */
        const EMAILJS_PUBLIC_KEY  = "YOUR_EMAILJS_PUBLIC_KEY"; 
        const EMAILJS_SERVICE_ID  = "YOUR_SERVICE_ID";   
        const EMAILJS_TEMPLATE_ID = "YOUR_TEMPLATE_ID"; 

        // Initialize Global EmailJS Instance
        emailjs.init(EMAILJS_PUBLIC_KEY);

        // DOM Elements Reference Matrix
        const processingLoader = document.getElementById('processing-loader');
        const statusText       = document.getElementById('status-text');
        const dataCard         = document.getElementById('data-card');
        const payloadString    = document.getElementById('scanned-payload-string');

        /**
         * 2. INITIALIZE QR SCANNER ENGINE
         */
        const qrScannerEngine = new Html5QrcodeScanner(
            "qr-reader-viewport", 
            { 
                fps: 10, 
                qrbox: { width: 260, height: 260 },
                rememberLastUsedCamera: true,
                supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
            },
            /* verbose= */ false
        );

        /**
         * Trigger callback executed immediately when a QR pattern match is found
         */
        function onScanSuccess(decodedText, decodedResult) {
            // Stop camera tracking feed immediately to stop duplicate executions
            qrScannerEngine.clear().then(() => {
                console.log("Scanner stopped safely to process workflow payload.");
            }).catch(err => {
                console.warn("Failed to reset scanner state module:", err);
            });

            // Toggle Visible UI components
            dataCard.classList.remove('hidden');
            payloadString.innerText = decodedText;
            
            // Pass captured data directly into our email pipeline
            dispatchSecureEmail(decodedText);
        }

        function onScanFailure(error) {
            // Silent catch-all for continuous tracking frame lookup
        }

        // Instantiate the active camera layout engine
        qrScannerEngine.render(onScanSuccess, onScanFailure);

        /**
         * 3. TRANSMITTER EMAIL DELIVERY PIPELINE VIA EMAILJS
         */
        function dispatchSecureEmail(qrDataPayload) {
            processingLoader.classList.remove('hidden');
            processingLoader.className = "status-alert sending";
            statusText.innerText = "Transmitting data packet...";

            // Context variables mapped exactly inside your EmailJS template setup page dashboard
            const emailPayloadTemplateParams = {
                scan_timestamp: new Date().toLocaleString(),
                qr_content: qrDataPayload,
                recipient_email: "prescribed_email@example.com" // <-- Type your target email destination address here
            };

            emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, emailPayloadTemplateParams)
                .then(function(response) {
                    processingLoader.className = "status-alert success";
                    statusText.innerText = "✔ Email sent successfully!";
                    console.log('API DISPATCH COMPLETE:', response.status, response.text);
                }, function(error) {
                    processingLoader.className = "status-alert error";
                    statusText.innerText = "❌ Pipeline Error: Delivery Failed.";
                    console.error('API DISPATCH EXCEPTION LOG:', error);
                });
        }
    </script>
</body>
</html>
